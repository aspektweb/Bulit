<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sehrli Rassom - Bolalar uchun</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #fab1a0;
            --bg: #dfe6e9;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        .header {
            background: white;
            width: 100%;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .canvas-container {
            position: relative;
            margin: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 8px solid #636e72;
        }
        canvas {
            border-radius: 12px;
            cursor: url('https://cdn-icons-png.flaticon.com/32/595/595536.png'), auto;
            touch-action: none;
        }
        .toolbar {
            position: fixed;
            bottom: 20px;
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            align-items: center;
        }
        .tool {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        .tool:hover { transform: scale(1.2); }
        .color-item { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-item.active { border-color: #2d3436; }
        
        #sizeSlider { cursor: pointer; }
        
        /* Baholash Paneli */
        #resultModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
        }
        .stars { color: #f1c40f; font-size: 40px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; color:var(--primary)">🎨 Mitti Rassom</h2>
    <div>
        <button class="tool" style="background:#00cec9" onclick="downloadImage()"><i class="fas fa-download"></i></button>
        <button class="tool" style="background:#ff7675" onclick="clearCanvas()"><i class="fas fa-trash"></i></button>
        <button id="checkBtn" style="background:#6c5ce7; border-radius: 20px; width: auto; padding: 0 20px;" class="tool" onclick="showGrade()">Tekshirish ✅</button>
    </div>
</div>

<div class="canvas-container">
    <canvas id="mainCanvas"></canvas>
</div>

<div class="toolbar">
    <div style="display:flex; gap:10px;">
        <div class="color-item active" style="background: #000;" onclick="setColor('#000', this)"></div>
        <div class="color-item" style="background: #ff7675;" onclick="setColor('#ff7675', this)"></div>
        <div class="color-item" style="background: #74b9ff;" onclick="setColor('#74b9ff', this)"></div>
        <div class="color-item" style="background: #55efc4;" onclick="setColor('#55efc4', this)"></div>
        <div class="color-item" style="background: #ffeaa7;" onclick="setColor('#ffeaa7', this)"></div>
    </div>
    <div style="border-left: 2px solid #eee; padding-left: 20px;">
        <i class="fas fa-paint-brush"></i>
        <input type="range" id="sizeSlider" min="2" max="50" value="10">
    </div>
    <button class="tool" style="background: #636e72" onclick="setEraser()"><i class="fas fa-eraser"></i></button>
</div>

<div id="resultModal">
    <h2 id="gradeText">Dahshat!</h2>
    <div class="stars" id="starContainer"></div>
    <p id="comment">Sening rasming juda noyob chiqdi!</p>
    <button class="tool" style="background:var(--primary); width:100%; border-radius:10px;" onclick="closeModal()">Yana chizish</button>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const sizeSlider = document.getElementById('sizeSlider');
    const modal = document.getElementById('resultModal');

    // Canvasni sozlash
    canvas.width = window.innerWidth * 0.85;
    canvas.height = window.innerHeight * 0.65;

    let drawing = false;
    let currentColor = '#000';
    let currentWidth = 10;

    // Chizish funksiyalari
    function startDrawing(e) {
        drawing = true;
        draw(e);
    }

    function stopDrawing() {
        drawing = false;
        ctx.beginPath();
    }

    function draw(e) {
        if (!drawing) return;
        
        ctx.lineWidth = sizeSlider.value;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = currentColor;

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    // Rang va o'chirg'ich
    function setColor(color, el) {
        currentColor = color;
        document.querySelectorAll('.color-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    function setEraser() {
        currentColor = '#ffffff';
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Baholash tizimi (Mukkamal mantiq)
    function showGrade() {
        const grades = [
            {t: "A'lo!", s: 5, c: "Siz haqiqiy Pikassosiz!"},
            {t: "Yaxshi!", s: 4, c: "Rangingiz juda chiroyli."},
            {t: "Zo'r!", s: 5, c: "Ijodingizga gap yo'q!"}
        ];
        const res = grades[Math.floor(Math.random() * grades.length)];
        
        document.getElementById('gradeText').innerText = res.t;
        document.getElementById('comment').innerText = res.c;
        document.getElementById('starContainer').innerHTML = '<i class="fas fa-star"></i>'.repeat(res.s);
        
        modal.style.display = 'block';
    }

    function closeModal() { modal.style.display = 'none'; }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'mening-rasmim.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // Eventlar
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

</script>
</body>
</html>
