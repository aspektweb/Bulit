<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfect Circle - Mening Loyiham</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Mobil qurilmalarda ekranni surilib ketishidan himoyalaydi */
        }

        #ui {
            position: absolute;
            top: 5%;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        h1 { font-weight: 300; margin-bottom: 5px; letter-spacing: 2px; }

        .stats {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
        }

        .controls {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
        }

        button {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .hint { font-size: 0.9rem; opacity: 0.6; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>MUKAMMAL AYLANA</h1>
        <div class="stats"><span id="score">0.0</span>%</div>
        <div class="hint">Markaz atrofida aylana chizing</div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <button onclick="resetCanvas()">QAYTA BOSHLASH</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        let drawing = false;
        let points = [];
        let centerX, centerY;

        // Ekran o'lchamiga moslash
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            centerX = canvas.width / 2;
            centerY = canvas.height / 2;
            drawCenterDot();
        }

        function drawCenterDot() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        window.addEventListener('resize', resize);
        resize();

        // Chizish funksiyalari (Sichqoncha va Touch uchun)
        function start(e) {
            drawing = true;
            points = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCenterDot();
            
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function move(e) {
            if (!drawing) return;
            const pos = getPos(e);
            points.push(pos);

            ctx.lineWidth = 4;
            ctx.strokeStyle = '#38bdf8';
            ctx.lineCap = 'round';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function end() {
            if (!drawing) return;
            drawing = false;
            calculateScore();
        }

        function getPos(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX, y: clientY };
        }

        // Voqealarni tinglash
        canvas.addEventListener('mousedown', start);
        canvas.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);

        canvas.addEventListener('touchstart', start);
        canvas.addEventListener('touchmove', move);
        window.addEventListener('touchend', end);

        function calculateScore() {
            if (points.length < 20) return;

            // Har bir nuqtaning markazdan masofasini o'lchash
            let radii = points.map(p => {
                return Math.sqrt(Math.pow(p.x - centerX, 2) + Math.pow(p.y - centerY, 2));
            });

            const avgRadius = radii.reduce((a, b) => a + b) / radii.length;
            
            // O'rtacha radiusdan og'ish (deviation)
            let totalDeviation = 0;
            radii.forEach(r => {
                totalDeviation += Math.abs(r - avgRadius);
            });

            const meanDeviation = totalDeviation / points.length;
            
            // Foizni hisoblash (formula biroz qat'iyroq qilingan)
            let score = 100 - (meanDeviation / avgRadius * 150);
            
            // Shaklning yopiqligini tekshirish (boshlang'ich va oxirgi nuqta masofasi)
            const startPoint = points[0];
            const endPoint = points[points.length - 1];
            const gap = Math.sqrt(Math.pow(startPoint.x - endPoint.x, 2) + Math.pow(startPoint.y - endPoint.y, 2));
            if (gap > avgRadius * 0.5) score -= 20; // Agar aylana yopilmasa jarima

            score = Math.max(0, Math.min(100, score));
            scoreEl.innerText = score.toFixed(1);
            
            // Effektlar
            if (score > 90) scoreEl.style.color = "#4ade80"; 
            else if (score > 70) scoreEl.style.color = "#fbbf24";
            else scoreEl.style.color = "#f87171";
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCenterDot();
            scoreEl.innerText = "0.0";
            scoreEl.style.color = "var(--accent-color)";
        }
    </script>
</body>
</html>
