<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kids Drawing Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="startScreen">
<h1>🎨 Drawing Game</h1>
<p>Draw something nice!</p>

<button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="hidden">

<h2>Choose what to draw</h2>

<button onclick="task('House')">🏠 House</button>
<button onclick="task('Tree')">🌳 Tree</button>
<button onclick="task('Sun')">☀️ Sun</button>

<h3 id="task"></h3>

<canvas id="canvas" width="800" height="500"></canvas>

<div class="tools">

<button onclick="setColor('red')">Red</button>
<button onclick="setColor('blue')">Blue</button>
<button onclick="setColor('green')">Green</button>

<button onclick="clearCanvas()">Clear</button>
<button onclick="saveImage()">Finish</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
