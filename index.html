<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kids Drawing Game</title>

<style>

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
font-family:Arial;
text-align:center;
}

h1{
color:white;
margin-top:20px;
}

#toolbar{
margin:20px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin:5px;
}

.color{
width:30px;
height:30px;
border-radius:50%;
display:inline-block;
cursor:pointer;
}

#canvas{
background:white;
border:5px solid #333;
border-radius:10px;
cursor:crosshair;
}

</style>
</head>

<body>

<h1>🎨 Kids Drawing Game</h1>

<div id="toolbar">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:black" onclick="setColor('black')"></div>

<br><br>

<button onclick="clearCanvas()">Clear</button>
<button onclick="saveImage()">Save</button>

</div>

<canvas id="canvas" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let painting = false;
let color = "black";

function setColor(c){
color = c;
}

function startPosition(e){
painting = true;
draw(e);
}

function endPosition(){
painting = false;
ctx.beginPath();
}

function draw(e){

if(!painting) return;

ctx.lineWidth = 5;
ctx.lineCap = "round";
ctx.strokeStyle = color;

ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);

}

canvas.addEventListener("mousedown",startPosition);
canvas.addEventListener("mouseup",endPosition);
canvas.addEventListener("mousemove",draw);

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function saveImage(){
const link = document.createElement('a');
link.download = 'drawing.png';
link.href = canvas.toDataURL();
link.click();
}

</script>

</body>
</html>
