<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kvadrat O'yini</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: sans-serif; }
        canvas { display: block; background: #111; }
        #ui {
            position: absolute; top: 10px; left: 10px;
            color: white; font-size: 18px; pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="ui">
        Vaqt: <span id="time">0</span>s <br>
        Dushmanlar soni: <span id="enemyCount">0</span> <br>
        Tezlik: <span id="speed">2.0</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // UI elementlari
        const timeEl = document.getElementById("time");
        const enemyCountEl = document.getElementById("enemyCount");
        const speedEl = document.getElementById("speed");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let startTime = Date.now();
        let gameOver = false;

        // O'yinchi obyekti (Ko'k kvadrat)
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            size: 20,
            color: "#00ffff",
            speed: 7
        };

        // Dushmanlar massivi
        const enemies = [];
        let enemyBaseSpeed = 2;

        // Klaviatura boshqaruvi
        const keys = {};
        window.addEventListener("keydown", (e) => keys[e.code] = true);
        window.addEventListener("keyup", (e) => keys[e.code] = false);

        function createEnemy() {
            const size = 20;
            enemies.push({
                x: Math.random() * (canvas.width - size),
                y: -size,
                size: size,
                speed: enemyBaseSpeed + Math.random() * 2,
                color: "#ff3333"
            });
        }

        function update() {
            if (gameOver) return;

            // Vaqtni hisoblash
            let elapsed = Math.floor((Date.now() - startTime) / 1000);
            timeEl.innerText = elapsed;
            
            // Dushmanlar tezligini vaqt o'tishi bilan oshirish
            enemyBaseSpeed = 2 + (elapsed / 10);
            speedEl.innerText = enemyBaseSpeed.toFixed(1);

            // O'yinchi harakati
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.size) player.x += player.speed;
            if (keys["ArrowUp"] && player.y > 0) player.y -= player.speed;
            if (keys["ArrowDown"] && player.y < canvas.height - player.size) player.y += player.size;

            // Dushmanlarni yangilash
            if (Math.random() < 0.05) createEnemy();

            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;

                // To'qnashuvni tekshirish
                if (
                    player.x < enemies[i].x + enemies[i].size &&
                    player.x + player.size > enemies[i].x &&
                    player.y < enemies[i].y + enemies[i].size &&
                    player.y + player.size > enemies[i].y
                ) {
                    gameOver = true;
                    alert("O'yin tugadi! Siz " + elapsed + " soniya chidadingiz.");
                    location.reload();
                }

                // Ekranda chiqib ketgan dushmanlarni o'chirish
                if (enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                }
            }
            enemyCountEl.innerText = enemies.length;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // O'yinchini chizish
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Dushmanlarni chizish
            for (let enemy of enemies) {
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
            }

            update();
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
