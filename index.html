<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolajonlar uchun rasm doskasi</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            overflow: hidden;
        }
        h1 { color: #ff4500; margin: 10px; }
        .toolbar {
            background: #fff;
            padding: 10px;
            display: flex;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        canvas {
            background: white;
            cursor: crosshair;
            margin-top: 10px;
            border: 5px solid #ffcc00;
            border-radius: 15px;
            touch-action: none;
        }
        .btn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .clear-btn { background-color: #ff6347; color: white; }
        .save-btn { background-color: #32cd32; color: white; }
        .color-picker { width: 50px; height: 50px; border: none; cursor: pointer; }
        
        /* Baholash qismi */
        #grade-area {
            margin-top: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #4b0082;
            height: 40px;
        }
    </style>
</head>
<body>

    <h1>🎨 Mening Sehrli Doskam 🖌️</h1>

    <div class="toolbar">
        <input type="color" id="colorPicker" class="color-picker" value="#000000">
        <button class="btn" style="background: #ddd;" onclick="useEraser()">🧽 O'chirg'ich</button>
        <button class="btn clear-btn" onclick="clearCanvas()">🗑️ Tozalash</button>
        <button class="btn save-btn" onclick="giveGrade()">🌟 Baholash</button>
    </div>

    <div id="grade-area"></div>
    <canvas id="paintCanvas"></canvas>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const gradeArea = document.getElementById('gradeArea');

        // Canvas hajmini ekranga moslash
        canvas.width = window.innerWidth - 40;
        canvas.height = window.innerHeight - 250;

        let painting = false;
        let color = "#000000";
        let lineWidth = 8;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            
            ctx.lineWidth = lineWidth;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;

            // Sichqoncha yoki sensorli ekran koordinatalari
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Rang tanlash
        colorPicker.addEventListener('input', (e) => {
            color = e.target.value;
            lineWidth = 8;
        });

        // O'chirg'ich funksiyasi
        function useEraser() {
            color = "#ffffff";
            lineWidth = 30;
        }

        // Tozalash
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('grade-area').innerText = "";
        }

        // Baholash funksiyasi (Bolalar uchun qiziqarli stikerlar bilan)
        function giveGrade() {
            const grades = [
                "Ajoyib! 🌟", 
                "Siz haqiqiy rassomsiz! 🎨", 
                "Barakalla! 👍", 
                "Juda chiroyli chiqdi! ❤️", 
                "Super! 🚀"
            ];
            const randomGrade = grades[Math.floor(Math.random() * grades.length)];
            document.getElementById('grade-area').innerText = randomGrade;
        }

        // Event listenerlar
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Sensorli ekranlar uchun (Planshet va telefon)
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });

    </script>
</body>
</html>
